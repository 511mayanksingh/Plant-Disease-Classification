<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Fasal Arogya</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary-color: #2ecc71;
      --primary-dark: #27ae60;
      --secondary-color: #3498db;
      --dark-bg: #1a1a2e;
      --text-dark: #2c3e50;
      --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.15);
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      color: var(--text-dark);
    }

    header {
      background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
      color: white;
      padding: 1.5rem 0;
      box-shadow: var(--shadow-lg);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .logo {
      font-size: 2rem;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .subtitle {
      font-size: 0.9rem;
      opacity: 0.9;
      margin-top: 0.25rem;
    }

    nav {
      background: rgba(255, 255, 255, 0.98);
      box-shadow: var(--shadow);
      position: sticky;
      top: 73px;
      z-index: 99;
    }

    .nav-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      gap: 2rem;
    }

    nav a {
      color: var(--text-dark);
      text-decoration: none;
      padding: 1rem 1.5rem;
      display: inline-block;
      font-weight: 500;
      transition: all 0.3s ease;
      position: relative;
    }

    nav a::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 3px;
      background: var(--primary-color);
      transition: width 0.3s ease;
    }

    nav a:hover {
      color: var(--primary-color);
    }

    nav a:hover::after {
      width: 80%;
    }

    .container {
      max-width: 500px;
      margin: 4rem auto;
      padding: 0 2rem;
    }

    .signup-card {
      background: white;
      border-radius: 20px;
      padding: 3rem;
      box-shadow: var(--shadow-lg);
    }

    .signup-card h2 {
      color: var(--primary-color);
      font-size: 2rem;
      margin-bottom: 0.5rem;
      text-align: center;
    }

    .signup-subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 2rem;
      font-size: 1rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      color: var(--text-dark);
      font-weight: 500;
      margin-bottom: 0.5rem;
      font-size: 0.95rem;
    }

    input[type="text"],
    input[type="password"],
    input[type="email"] {
      width: 100%;
      padding: 0.9rem 1.2rem;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1rem;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    input[type="text"]:focus,
    input[type="password"]:focus,
    input[type="email"]:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.1);
    }

    .btn-signup {
      width: 100%;
      background: var(--primary-color);
      color: white;
      border: none;
      padding: 1rem;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-signup:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .btn-signup:active {
      transform: translateY(0);
    }

    .login-link {
      text-align: center;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid #e0e0e0;
      color: #666;
    }

    .login-link a {
      color: var(--secondary-color);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s ease;
    }

    .login-link a:hover {
      color: #2980b9;
      text-decoration: underline;
    }

    footer {
      background: rgba(26, 26, 46, 0.95);
      color: white;
      text-align: center;
      padding: 2rem;
      margin-top: 4rem;
    }

    .footer-quote {
      font-style: italic;
      opacity: 0.9;
      margin: 0.5rem 0;
      font-size: 1.05rem;
    }

    @media (max-width: 768px) {
      .container {
        margin: 2rem auto;
      }

      .signup-card {
        padding: 2rem 1.5rem;
      }

      .nav-content {
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.5rem;
      }

      nav a {
        padding: 0.8rem 1rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <div class="logo">🌱</div>
      <div>
        <h1>Fasal Arogya</h1>
        <div class="subtitle">Advanced Plant Disease Detection System</div>
      </div>
    </div>
  </header>

  <nav>
    <div class="nav-content">
      <a href="{{ url_for('Home') }}">Home</a>
      <a href="{{ url_for('About') }}">About Us</a>
      <a href="{{ url_for('Info') }}">Disease Info</a>
      <a href="{{ url_for('Login') }}">Login</a>
    </div>
  </nav>

  <div class="container">
    <div class="signup-card">
      <h2>Create Account</h2>
      <p class="signup-subtitle">Join Fasal Arogya today</p>

      <form action="/signup" method="post">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Choose a username" required>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="your.email@example.com" required>
        </div>

        <div class="form-group">
          <label for="mobile_number">Mobile Number</label>
          <input type="text" id="mobile_number" name="mobile_number" placeholder="+91 1234567890" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Create a strong password" required>
        </div>

        <button type="submit" class="btn-signup">Sign Up</button>
      </form>

      <div class="login-link">
        Already have an account? <a href="{{ url_for('Login') }}">Login here</a>
      </div>
    </div>
  </div>

  <footer>
    <div class="footer-quote">"Farming is a profession of hope."</div>
    <div class="footer-quote">"The best fertilizer is the farmer's shadow."</div>
    <div style="margin-top: 1rem; opacity: 0.7;">© 2024 Fasal Arogya. All rights reserved.</div>
  </footer>
</body>
</html>
